apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: hitcounter
    control-plane: controller-manager
  name: hitcounter-controller-manager-metrics-service
  namespace: hitcounter-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: hitcounter
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: hitcounter
    control-plane: controller-manager
  name: hitcounter-controller-manager
  namespace: hitcounter-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hitcounter
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: hitcounter
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-require-rbac
        - --metrics-secure
        - --metrics-bind-address=:8443
        - --leader-elect
        - --leader-election-id=hitcounter
        - --health-probe-bind-address=:8081
        image: ghcr.io/paulovigne/hitcounter-operator:main
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: hitcounter-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
