replicas: 3

image:
  repository: ghcr.io/paulovigne/hitcounter
  tag: v1.0.0

ingress:
  class: traefik
  host: app.myhost.com
  tlsSecret: hitcounter-prod-tls

redis:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  cpuUtilization: 60
