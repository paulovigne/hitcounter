apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

components:
  - ../../components/redis

replicas:
  - name: hitcounter
    count: 1

images:
  - name: ghcr.io/paulovigne/hitcounter
    newTag: dev

patches:
  - target:
      kind: Ingress
      name: hitcounter
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: traefik
      - op: replace
        path: /spec/rules/0/host
        value: hitcounter.dev.local

  - target:
      kind: HorizontalPodAutoscaler
      name: hitcounter
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3