replicas: 1

image:
  repository: ghcr.io/paulovigne/hitcounter
  tag: dev

ingress:
  class: traefik
  host: hitcounter.dev.local
  tlsSecret: hitcounter-dev-tls

redis:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 60
