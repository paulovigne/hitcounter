apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}  
data:
  PORT: {{ .Values.config.port | quote }}
  ENABLE_REDIS: {{ .Values.config.enableRedis | quote }}
  REDIS_HOST: {{ if .Values.config.redisHost }}
  {{- .Values.config.redisHost | quote }}
{{- else }}
  {{- include "app.name" . }}-redis-svc | quote }}
{{- end }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}