# ============================================================
# Application Scaling Configuration
# ============================================================

# Number of pod replicas created by default.
# Ignored if HPA is enabled.
replicaCount: 2

# ------------------------------------------------------------
# Horizontal Pod Autoscaler (HPA)
# Creates an HPA resource when enabled.
# Requires metrics-server installed in the cluster.
# ------------------------------------------------------------
hpa:
  enabled: false

  # Minimum number of replicas when HPA is active.
  # Should usually match replicaCount.
  minReplicas: 2

  # Maximum number of replicas allowed by autoscaling.
  maxReplicas: 6

  # Target average CPU utilization percentage.
  # Example: 60 means scale when CPU > 60%.
  cpuUtilization: 60


# ============================================================
# Container Image Configuration
# ============================================================

image:

  # Container image repository.
  repository: ghcr.io/paulovigne/hitcounter

  # Image tag (use fixed tag in production).
  tag: main

  # Image pull policy:
  # Always | IfNotPresent | Never
  pullPolicy: Always

  # Optional imagePullSecret for private registries.
  pullSecret: null


# ============================================================
# Probes Configuration
# Used to determine container health.
# ============================================================

probe:

  # ----------------------------------------------------------
  # Startup Probe (optional)
  # Useful for slow-starting applications.
  # If enabled, liveness/readiness are ignored until it succeeds.
  # ----------------------------------------------------------
  # startup:
  #   httpGet:
  #     path: /healthz
  #     port: 8080
  #   initialDelaySeconds: 10
  #   periodSeconds: 10
  #   timeoutSeconds: 1
  #   failureThreshold: 30
  #   successThreshold: 1

  # ----------------------------------------------------------
  # Liveness Probe
  # Restarts container if it fails repeatedly.
  # ----------------------------------------------------------
  liveness:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  # ----------------------------------------------------------
  # Readiness Probe
  # Controls if pod receives traffic.
  # If failing, traffic is stopped but container is not restarted.
  # ----------------------------------------------------------
  readiness:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1


# ============================================================
# Security Context
# Ignored if OpenShift SCC overrides it.
# ============================================================

securityContext:

  # Run container as non-root user.
  # 65532 is commonly used for distroless images.
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532


# ============================================================
# Resource Requests and Limits
# Required for HPA to function correctly.
# ============================================================

requests:
  cpu: 50m
  memory: 64Mi

limits:
  cpu: 200m
  memory: 128Mi


# ============================================================
# Service Configuration
# ============================================================

service:

  # Service type:
  # ClusterIP | NodePort | LoadBalancer
  # Usually ClusterIP when using ingress/gateway.
  type: ClusterIP

  # Service port exposed internally.
  port: 80

  # Container port.
  targetPort: 8080


# ============================================================
# Application Runtime Configuration
# ============================================================

config:

  # Application listening port (must match container).
  port: "8080"

  # Enables Redis integration inside the app.
  enableRedis: true

  # Redis service hostname (Kubernetes service name).
  redisHost: redis-svc

  # Redis port.
  redisPort: "6379"

# ============================================================
# Exposure Configuration
# Controls how the application is exposed outside the cluster
# Supported types:
#   - ingress     → Kubernetes Ingress (nginx, traefik, etc)
#   - gatewayapi  → Kubernetes Gateway API
#   - route       → OpenShift Route
#   - istio       → Istio Gateway + VirtualService
# ============================================================

exposure:

  # Defines which exposure mechanism will be rendered.
  # This is the SINGLE source of truth.
  type: ingress

  # Public hostname used by all exposure types.
  # If null, some providers may auto-generate.
  host: hitcounter.local

  # ==========================================================
  # TLS Configuration (centralized for all providers)
  # ==========================================================
  tls:

    # Enables TLS for the selected exposure type.
    enabled: false

    # Generic TLS mode.
    # Mapping depends on exposure.type:
    #
    # ingress:
    #   - Only supports termination (secret-based TLS)
    #
    # gatewayapi:
    #   - Terminate
    #   - Passthrough
    #
    # route (OpenShift):
    #   - edge
    #   - passthrough
    #   - reencrypt
    #
    # istio:
    #   - SIMPLE
    #   - PASSTHROUGH
    #   - MUTUAL
    #
    mode: null

    # ----------------------------------------------------------
    # TLS Secret Management
    # ----------------------------------------------------------
    secret:

      # If true, the chart will create a kubernetes.io/tls Secret.
      # If false, an existing secret must already exist in the namespace.
      create: false

      # Name of the TLS secret used by:
      # - Ingress
      # - Gateway API (Terminate mode)
      # - Istio (credentialName)
      # Ignored for OpenShift edge if using built-in router cert.
      name: hitcounter-tls

      # --------------------------------------------------------
      # cert-manager integration
      # --------------------------------------------------------
      certManager:

        # If true, a Certificate resource will be created.
        # Requires cert-manager installed in the cluster.
        enabled: false

        # Name of the Issuer or ClusterIssuer
        issuerName: null

        # Issuer or ClusterIssuer
        # Valid values:
        #   - Issuer
        #   - ClusterIssuer
        issuerKind: null

      # --------------------------------------------------------
      # Manual certificate definition
      # Used only if:
      #   - secret.create = true
      #   - certManager.enabled = false
      #
      # Values must be provided in PEM format.
      # They will be base64 encoded automatically.
      # --------------------------------------------------------

      # Server certificate (PEM format)
      crt: null

      # Private key (PEM format)
      key: null

      # Optional CA bundle (PEM format)
      # Useful for:
      #   - Self-signed certs
      #   - Internal corporate CA
      ca: null


  # ==========================================================
  # Provider Specific Configuration
  # Only the block matching exposure.type is used.
  # ==========================================================

  # ----------------------------------------------------------
  # Kubernetes Ingress Configuration
  # Used when exposure.type = "ingress"
  # ----------------------------------------------------------
  ingress:

    # IngressClass (e.g., nginx, traefik)
    className: traefik


  # ----------------------------------------------------------
  # Kubernetes Gateway API Configuration
  # Used when exposure.type = "gatewayapi"
  # ----------------------------------------------------------
  gatewayapi:

    # Name of the GatewayClass
    # Example: traefik, istio, contour
    gatewayClassName: traefik


  # ----------------------------------------------------------
  # Istio Configuration
  # Used when exposure.type = "istio"
  # ----------------------------------------------------------
  istio:

    # Namespace where the Istio ingress gateway is installed.
    namespace: istio-system

    # Name of the ingress gateway workload/service.
    ingressGatewayName: ingressgateway

# ============================================================
# Redis Subcomponent Configuration
# Only used if deploying embedded Redis.
# ============================================================

redis:

  # Redis image (pin version in production).
  image: redis:7-alpine

  # Image pull policy.
  pullPolicy: Always

  # Optional imagePullSecret.
  pullSecret: null

  # Persistent storage size for Redis PVC.
  # Ignored if persistence template not implemented.
  storage: 1Gi

  # Security context for Redis container.
  # OpenShift may override via SCC.
  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532

  # Resource requests (minimum guaranteed).
  requests:
    cpu: 250m
    memory: 256Mi

  # Resource limits (maximum allowed).
  limits:
    cpu: 1
    memory: 1Gi
