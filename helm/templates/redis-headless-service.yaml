{{- if .Values.config.enableRedis }}
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}  
spec:
  clusterIP: None
  selector:
    app: {{ include "app.name" . }}-redis
  ports:
    - port: 6379
      name: redis
{{- end }}
