{{- if .Values.exposure.tls.secret.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "app.name" . }}-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}  
spec:
  secretName: {{ .Values.tls.secret.name }}
  issuerRef:
    name: {{ .Values.tls.secret.certManager.issuerName }}
    kind: {{ .Values.tls.secret.certManager.issuerKind | default "Issuer" }}
  dnsNames:
  - {{ .Values.exposure.host }}
{{- end }}