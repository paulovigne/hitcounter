# This rule is not used by the project hitcounter itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to apps.vigne.com.br resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hitcounter
    app.kubernetes.io/managed-by: kustomize
  name: hitcounter-viewer-role
rules:
- apiGroups:
  - apps.vigne.com.br
  resources:
  - hitcounters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps.vigne.com.br
  resources:
  - hitcounters/status
  verbs:
  - get
